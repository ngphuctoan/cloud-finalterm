global:
  scrape_interval: 15s

scrape_configs:
  - job_name: node-exporter
    static_configs:
      - targets: [node-exporter:9100]

  - job_name: frontend
    static_configs:
      - targets: [frontend-metrics:9113]

  - job_name: backend
    static_configs:
      - targets: [backend:3000]

  - job_name: db
    static_configs:
      - targets: [postgres-exporter:9187]

  - job_name: auth
    static_configs:
      - targets: [auth:9000]

  - job_name: s3
    static_configs:
      - targets: [s3:1234]

  - job_name: session
    static_configs:
      - targets: [redis-exporter:9121]

  - job_name: dns
    static_configs:
      - targets: [dns:9153]

  - job_name: proxy
    static_configs:
      - targets: [proxy:8080]
