networks:
  miniws-internal:
    name: miniws-internal
    driver: bridge
    ipam:
      config:
        - subnet: 172.237.0.0/16

services:
  frontend-server:
    build: ./01-frontend-server
    networks:
      miniws-internal:
        ipv4_address: 172.237.0.3
    ports:
      - 8080:80
    volumes:
      - ./01-frontend-server/nginx.conf:/etc/nginx/nginx.conf:ro,Z
    restart: unless-stopped

  frontend-metrics-server:
    image: nginx/nginx-prometheus-exporter:latest
    networks:
      - miniws-internal
    ports:
      - 9113:9113
    environments:
      - NGINX_SCRAPE_URI=http://frontend-server/stub_status
    depends_on:
      - frontend-server
    restart: unless-stopped

  relational-database:
    image: postgres:latest
    networks:
      - miniws-internal
    ports:
      - 5432:5432
    environment:
      - POSTGRES_PASSWORD=miniws
      - POSTGRES_DB=miniwsdb
    volumes:
      - ./03-relational-database/migrations:/docker-entrypoint-initdb.d:ro,Z
    restart: unless-stopped

  backend-server:
    build: ./02-backend-server
    networks:
      - miniws-internal
    ports:
      - 8081:8000
    depends_on:
      - relational-database
    restart: unless-stopped

  object-storage:
    image: chrislusf/seaweedfs
    command: server -dir=/data -s3 -s3.config=/etc/seaweedfs/s3.json
    networks:
      - miniws-internal
    ports:
      - 8333:8333
    volumes:
      - ./05-object-storage/data:/data:rw,Z
      - ./05-object-storage/s3.json:/etc/seaweedfs/s3.json:ro,Z
    restart: unless-stopped

  seaweedfs-admin:
    image: chrislusf/seaweedfs
    command: admin -masters=object-storage:9333
    ports:
      - 23646:23646
    depends_on:
      - object-storage
    restart: unless-stopped

  dns-server:
    image: ubuntu/bind9:latest
    networks:
      miniws-internal:
        ipv4_address: 172.237.0.2
    ports:
      - 30053:53/tcp
      - 30053:53/udp
    volumes:
      - ./06-dns-server:/etc/bind:ro,Z
    depends_on:
      - frontend-server
    restart: unless-stopped

  node-exporter-server:
    image: prom/node-exporter:latest
    networks:
      - miniws-internal
    ports:
      - 9100:9100
    restart: unless-stopped

  prometheus-server:
    image: prom/prometheus:latest
    networks:
      - miniws-internal
    ports:
      - 9090:9090
    volumes:
      - ./07-prometheus-server/prometheus.yml:/etc/prometheus/prometheus.yml:ro,Z
    depends_on:
      - node-exporter-server
      - frontend-metrics-server
    restart: unless-stopped

  grafana-dashboard:
    image: grafana/grafana:latest
    networks:
      - miniws-internal
    ports:
      - 3333:3000
    depends_on:
      - prometheus-server
    restart: unless-stopped

  reverse-proxy:
    image: nginx:stable-alpine
    networks:
      - miniws-internal
    ports:
      - 8000:80
    volumes:
      - ./09-reverse-proxy/nginx.conf:/etc/nginx/nginx.conf:ro,Z
    restart: unless-stopped
