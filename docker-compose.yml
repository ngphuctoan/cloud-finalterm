networks:
  keepbin-net:
    driver: bridge

services:
  db:
    image: postgres
    networks:
      - keepbin-net
    ports:
      - 5432:5432
    environment:
      - POSTGRES_PASSWORD=${DB_PASS}
    volumes:
      - ./03-db/postgresql:/var/lib/postgresql:rw,Z
      - ./03-db/migrations:/docker-entrypoint-initdb.d:ro,Z
    restart: unless-stopped

  s3:
    image: chrislusf/seaweedfs
    command: server -dir=/data -s3
    networks:
      - keepbin-net
    ports:
      - 8333:8333
    environment:
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=${S3_SECRET}
    volumes:
      - ./05-s3/data:/data:rw,Z
    restart: unless-stopped

  seaweedfs-admin:
    image: chrislusf/seaweedfs
    command: admin -adminUser=admin -adminPassword=${SEAWEEDFS_ADMIN_PASS} -masters=s3:9333
    networks:
      - keepbin-net
    ports:
      - 23646:23646
    depends_on:
      - s3
    restart: unless-stopped

  auth:
    image: quay.io/keycloak/keycloak
    command: start-dev
    networks:
      - keepbin-net
    ports:
      - 8083:8080
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${KC_PASS}
    volumes:
      - ./04-auth/keycloak:/opt/keycloak/data/h2:rw,Z
    restart: unless-stopped

  session:
    image: valkey/valkey
    networks:
      - keepbin-net
    ports:
      - 6379:6379
    restart: unless-stopped
